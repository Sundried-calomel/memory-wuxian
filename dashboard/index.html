abel">${g.cloudIdentity}</span><b>${cloudPeer.cloud_ready?g.ready:g.waitingPairing}</b>${cloudPeer.cloud_fingerprint?`<span class="fingerprint">${esc(cloudPeer.cloud_fingerprint)}</span>`:''}</div><div><span class="label">${g.lastImport}</span><b>${esc(when(cloudPeer.last_sync_at||device.last_sync_at))}</b></div><div><span class="label">${g.cursor}</span><b>${fmt(device.last_event_sequence)}</b></div><div><span class="label">${g.ackCursor}</span><b>${fmt(ack.last_event_sequence)}</b></div><div><span class="label">${g.outstanding}</span><b>${cloudPeer.outstanding?g.yes:g.no}</b></div><div><span class="label">${g.replicaSize}</span><b>${formatBytes(device.replica_bytes)}</b></div></article>`}).join('')||`<div class="empty">${esc(g.emptyDevices)}</div>`;document.querySelector('#recent-sync').innerHTML=(d.recent_sync||[]).slice().reverse().map(item=>{const details=Object.fromEntries(Object.entries(item).filter(([key])=>!['timestamp','event','node_id'].includes(key)));return`<div class="event-row"><span>${esc(when(item.timestamp))}</span><span><b>${esc(item.event||t.none)}</b><br><span class="label">${esc(item.node_id||t.none)}</span></span><span class="label">${esc(Object.keys(details).length?JSON.stringify(details):g.none||t.none)}</span></div>`}).join('')||`<div class="empty">${esc(g.emptyEvents)}</div>`;notifyCloudFailure(cloudFailureKey(d))}
function conversationCard(c,t){const u=c.telemetry?.window_ratio_percent,cls=u>=100?'high':u>=80?'warn':'',sums=Object.entries(c.summary_counts).map(([l,n])=>`L${l}: ${fmt(n)}`).join(' / ')||t.none,request=u==null?t.none:u.toFixed(1)+'%',tip=c.telemetry?t.requestTip(fmt(c.telemetry.request_tokens),fmt(c.telemetry.context_window)):'';return `<article class="conversation"><div class="identity"><h3 title="${esc(c.title)}">${esc(c.title)}</h3><span class="label">${esc(c.conversation_id)}</span></div><div title="${esc(tip)}"><span class="label">${t.requestWindow}</span><b>${request}</b><div class="meter"><i class="${cls}" style="width:${Math.min(100,u||0)}%"></i></div></div><div><span class="label">${t.archiveEstimate}</span><b>${fmt(c.estimated_archive_tokens)} token</b></div><div><span class="label">${t.toolCalls}</span><b>${fmt(c.tool_activity_count)}</b></div><div><span class="label">${t.rounds}</span><b>${fmt(c.completed_rounds)}</b></div><div><span class="label">${t.summaries}</span><b>${sums}</b></div></article>`}
function renderConversations(d,t){const items=conversationView==='archived'?d.archived_conversations:d.active_conversations;document.querySelectorAll('.view-tab').forEach(b=>b.setAttribute('aria-selected',String(b.dataset.view===conversationView)));document.querySelector('#active-tab').textContent=`${t.active} ${fmt(d.totals.active_conversations)}`;document.querySelector('#archived-tab').textContent=`${t.archived} ${fmt(d.totals.archived_conversations)}`;const groups=Object.groupBy?Object.groupBy(items,c=>c.project||t.none):items.reduce((all,c)=>{const key=c.project||t.none;(all[key]||=[]).push(c);return all},{});document.querySelector('#conversations').innerHTML=Object.entries(groups).sort(([a],[b])=>a.localeCompare(b,t.locale)).map(([project,rows])=>`<section class="project-group"><div class="project-heading"><h3>${esc(project)}</h3><span>${fmt(rows.length)}</span></div><div class="project-conversations">${rows.map(c=>conversationCard(c,t)).join('')}</div></section>`).join('')||`<div class="empty">${t.emptyConversation}</div>`}
function achievementRows(d){return achievementDefinitions.map(a=>({...a,value:a.value(d),unlocked:a.value(d)>=a.goal}))}
function readAchievementState(){try{return JSON.parse(localStorage.getItem(ACHIEVEMENTS_KEY)||'null')}catch{return null}}
function writeAchievementState(state){localStorage.setItem(ACHIEVEMENTS_KEY,JSON.stringify(state))}
function showToast(achievement){const f=ft(),toast=document.createElement('div');toast.className='toast';toast.innerHTML=`<b>${esc(f.milestone)}: ${esc(achievement.title[language])}</b><span>${esc(achievement.description[language])}</span>`;document.querySelector('#toast-region').append(toast);setTimeout(()=>toast.remove(),5200)}
function evaluateAchievements(d){const rows=achievementRows(d),met=rows.filter(a=>a.unlocked).map(a=>a.id),state=readAchievementState();if(!state){writeAchievementState({unlocked:met,initializedAt:new Date().toISOString()});return}const known=new Set(state.unlocked||[]),fresh=rows.filter(a=>a.unlocked&&!known.has(a.id));if(!fresh.length)return;fresh.forEach(a=>known.add(a.id));writeAchievementState({...state,unlocked:[...known],updatedAt:new Date().toISOString()});if(!settings.achievementsEnabled)return;if(settings.animationsEnabled){const b=document.querySelector('#achievements-open');b.classList.remove('milestone');void b.offsetWidth;b.classList.add('milestone')}if(settings.toastsEnabled)fresh.slice(0,3).forEach((a,i)=>setTimeout(()=>showToast(a),i*450))}
function renderAchievements(d){const f=ft(),rows=achievementRows(d),done=rows.filter(a=>a.unlocked).length;document.querySelector('#achievement-summary').innerHTML=`<div><span class="label">${f.progress}</span><b>${fmt(done)} / ${fmt(rows.length)}</b></div><span>${Math.round(done/rows.length*100)}%</span>`;document.querySelector('#achievement-grid').innerHTML=rows.map(a=>`<article class="achievement-item ${a.unlocked?'unlocked':''}"><span class="achievement-mark">${a.unlocked?'&#10003;':'&#9734;'}</span><div><h3>${esc(a.title[language])}</h3><p>${esc(a.description[language])} · ${fmt(Math.min(a.value,a.goal))}/${fmt(a.goal)}</p></div><span class="achievement-state">${a.unlocked?f.unlocked:f.locked}</span></article>`).join('')}
function settingRow(title,help,control){return `<div class="setting-row"><div class="setting-copy"><b>${title}</b><span>${help}</span></div>${control}</div>`}
function toggleControl(key){return `<label class="switch"><input type="checkbox" data-setting="${key}" ${settings[key]?'checked':''}><i></i></label>`}
function renderSettings(){const f=ft(),t=tr(),cloud=latestDevices?.cloud||{},scheduler=cloud.scheduler||{},cloudHelp=!cloud.configured?f.cloudSyncUnconfiguredHelp:(cloud.enabled?f.cloudSyncEnabledHelp:f.cloudSyncDisabledHelp),directory=cloud.exchange_root||t.none;document.querySelector('#settings-list').innerHTML=[
  settingRow(f.cloudSyncSwitch,cloudHelp,`<label class="switch"><input type="checkbox" data-cloud-toggle ${cloud.enabled?'checked':''} ${cloud.configured?'':'disabled'}><i></i></label>`),
  settingRow(f.cloudDirectory,`${f.cloudDirectoryHelp}: ${esc(directory)}`,`<span>${cloud.configured?fed().configured:fed().unconfigured}</span>`),
  settingRow(f.cloudScheduler,scheduler.running?f.cloudSchedulerRunning:f.cloudSchedulerStopped,`<button class="setting-command" data-cloud-action="sync" ${cloud.enabled?'':'disabled'}>${f.syncNow}</button>`),
  settingRow(f.achievementSwitch,f.achievementSwitchHelp,toggleControl('achievementsEnabled')),
  settingRow(f.animationSwitch,f.animationSwitchHelp,toggleControl('animationsEnabled')),
  settingRow(f.toastSwitch,f.toastSwitchHelp,toggleControl('toastsEnabled')),
  settingRow(f.cloudFailureSwitch,f.cloudFailureSwitchHelp,toggleControl('cloudFailureAlertsEnabled')),
  settingRow(f.compactSwitch,f.compactSwitchHelp,toggleControl('compactMode')),
  settingRow(f.defaultView,f.defaultViewHelp,`<select data-setting="defaultView"><option value="active" ${settings.defaultView==='active'?'selected':''}>${t.active}</option><option value="archived" ${settings.defaultView==='archived'?'selected':''}>${t.archived}</option></select>`),
  settingRow(f.refreshInterval,f.refreshIntervalHelp,`<select data-setting="refreshSeconds">${[15,30,60,120].map(n=>`<option value="${n}" ${+settings.refreshSeconds===n?'selected':''}>${n} ${f.secondsUnit}</option>`).join('')}</select>`)
].join('')}
async function runCloudAction(action){const f=ft();document.querySelectorAll('[data-cloud-toggle],[data-cloud-action]').forEach(e=>e.disabled=true);try{const response=await fetch('/api/cloud',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action})});const payload=await response.json();if(!response.ok)throw new Error(payload.error||response.status);latestDevices=payload.devices;renderDevices(payload.devices);renderSettings();showSystemToast(f.cloudActionDone,action==='sync'?f.syncNow:f.cloudSyncSwitch)}catch(error){showSystemToast(f.cloudActionFailed,String(error));await load(false);renderSettings()}}
function applySettings(){document.body.classList.toggle('compact',settings.compactMode);document.querySelector('#achievements-open').hidden=!settings.achievementsEnabled;scheduleRefresh()}
function saveSetting(control){const key=control.dataset.setting;settings[key]=control.type==='checkbox'?control.checked:control.value;if(key==='refreshSeconds')settings[key]=+settings[key];localStorage.setItem(SETTINGS_KEY,JSON.stringify(settings));if(key==='defaultView'){conversationView=settings.defaultView;if(latest)renderConversations(latest,tr())}applySettings()}
function scheduleRefresh(){if(refreshTimer)clearInterval(refreshTimer);refreshTimer=setInterval(()=>load(false),Math.max(15,+settings.refreshSeconds||30)*1000)}
function render(d){
  latest=d;const t=tr(),x=d.totals;
  document.querySelector('#health').textContent=d.health==='ok'?t.healthy:t.attention;
  document.querySelector('#metrics').innerHTML=[[t.metrics[0],x.active_conversations],[t.metrics[1],x.messages],[t.metrics[2],x.tool_activities],[t.metrics[3],x.summary_counts['1']||0]].map(v=>`<div class="metric"><span class="label">${v[0]}</span><b>${fmt(v[1])}</b></div>`).join('');
  const max=Math.max(1,...d.daily.map(v=>v.characters));
  document.querySelector('#timeline').innerHTML=d.daily.length?d.daily.slice(-14).map(v=>`<div class="bar-wrap" title="${v.date}: ${fmt(v.characters)} ${t.barChars}"><div class="bar" style="height:${Math.max(2,v.characters/max*145)}px"></div><div class="bar-date">${v.date.slice(5)}</div></div>`).join(''):`<div class="empty">${t.emptyArchive}</div>`;
  const levels=Object.entries(x.summary_counts).filter(([l,n])=>+l<=8&&+n>0),lm=Math.max(1,...levels.map(v=>v[1]));
  document.querySelector('#levels').innerHTML=levels.map(([l,n])=>`<div class="level"><span>L${l}</span><div class="track"><div class="fill" style="width:${n/lm*100}%"></div></div><b>${fmt(n)}</b></div>`).join('')||`<div class="empty">${t.none}</div>`;
  const c=d.collector,mode=c?.mode||'unavailable',modeText=mode==='active'?t.active:mode==='idle'?t.idle:mode==='deep-idle'?t.deepIdle:t.unavailable,when=v=>v?new Date(v).toLocaleString(t.locale):t.none,memory=c?.memory_bytes==null?t.unavailable:(c.memory_bytes/1048576).toFixed(1)+' MB',cpu=c?.cpu_percent==null?t.unavailable:c.cpu_percent.toFixed(1)+'%';
  document.querySelector('#collector').innerHTML=[[t.mode,modeText,`mode-${mode}`],[t.interval,c?fmt(c.fallback_interval_seconds)+' '+t.seconds:t.unavailable,''],[t.lastEvent,when(c?.last_file_event),''],[t.lastArchive,when(c?.last_archive_update),''],[t.wakeups,c?fmt(c.wakeups_last_hour)+' '+t.times:t.unavailable,''],[t.resources,`${cpu} / ${memory}`,'']].map(v=>`<div class="collector-item"><span class="label">${v[0]}</span><b class="${v[2]}">${v[1]}</b></div>`).join('');
  renderConversations(d,t);
  evaluateAchievements(d);renderAchievements(d);
  document.querySelector('#footer').innerHTML=`<span>${t.days} <b>${fmt(x.archived_days)}</b> ${t.dayUnit}</span><span>${t.characters} <b>${fmt(x.characters)}</b> ${t.characterUnit}</span><span>${t.storage} <b>${formatBytes(x.storage_bytes)}</b></span><span>${t.tokenEstimate} <b>${fmt(x.estimated_tokens)}</b> token</span><span>${t.messageTokenEstimate} <b>${fmt(x.message_estimated_tokens)}</b> token</span><span>${t.lastRefresh} <b>${new Date(d.generated_at).toLocaleTimeString(t.locale)}</b></span>`;
}
async function load(manual=false){const b=document.querySelector('#refresh');if(manual){b.classList.remove('spinning');void b.offsetWidth;b.classList.add('spinning');b.disabled=true}const [archiveResult,devicesResult]=await Promise.allSettled([fetch('/api/status',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()}),fetch('/api/devices',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(r.status);return r.json()})]);if(archiveResult.status==='fulfilled'){localStorage.setItem(STATUS_CACHE_KEY,JSON.stringify(archiveResult.value));render(archiveResult.value)}else if(!latest)document.querySelector('#health').textContent=tr().failed;if(devicesResult.status==='fulfilled')renderDevices(devicesResult.value);else notifyCloudFailure(String(devicesResult.reason||fed().cloudFailure));finallyRefresh(manual,b)}
function finallyRefresh(manual,b){if(manual)setTimeout(()=>{b.classList.remove('spinning');b.disabled=false},650)}
const languageToggle=document.querySelector('#language-toggle'),languageMenu=document.querySelector('#language-menu');
function closeLanguageMenu(){languageMenu.classList.remove('open');languageToggle.setAttribute('aria-expanded','false')}
languageToggle.onclick=()=>{const open=languageMenu.classList.toggle('open');languageToggle.setAttribute('aria-expanded',String(open))};
document.querySelectorAll('[data-language]').forEach(b=>b.onclick=()=>{language=b.dataset.language;localStorage.setItem('memory-wuxian-language',language);closeLanguageMenu();staticText();renderSettings();if(latest)render(latest);if(latestDevices)renderDevices(latestDevices)});
document.addEventListener('click',e=>{if(!e.target.closest('.language-control'))closeLanguageMenu()});
document.querySelector('#refresh').onclick=()=>load(true);
document.querySelector('#achievements-open').onclick=()=>{if(latest)renderAchievements(latest);document.querySelector('#achievements-dialog').showModal()};
document.querySelector('#settings-open').onclick=async()=>{await load(false);renderSettings();document.querySelector('#settings-dialog').showModal()};
document.querySelectorAll('[data-close]').forEach(b=>b.onclick=()=>document.querySelector('#'+b.dataset.close).close());
document.querySelector('#settings-list').addEventListener('change',e=>{if(e.target.dataset.setting)saveSetting(e.target);if(e.target.hasAttribute('data-cloud-toggle'))runCloudAction(e.target.checked?'enable':'disable')});
document.querySelector('#settings-list').addEventListener('click',e=>{const action=e.target.closest('[data-cloud-action]')?.dataset.cloudAction;if(action)runCloudAction(action)});
document.querySelectorAll('[data-primary-view]').forEach(b=>b.onclick=()=>selectPrimaryView(b.dataset.primaryView));
staticText();selectPrimaryView(primaryView);renderSettings();applySettings();try{const cached=JSON.parse(localStorage.getItem(STATUS_CACHE_KEY)||'null');if(cached)render(cached)}catch{}if(!latest)document.querySelector('#health').textContent=tr().loading;load();
document.querySelectorAll('.view-tab').forEach(b=>b.onclick=()=>{conversationView=b.dataset.view;if(latest)renderConversations(latest,tr())});
</script>
</body>
