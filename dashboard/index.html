<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Memory无限状态台</title>
  <style>
    :root{color-scheme:light;--ink:#17211d;--muted:#62706a;--line:#d7ded9;--paper:#f6f8f5;--white:#fff;--green:#19734a;--amber:#b76516;--blue:#24689b;--red:#b33a32}*{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px/1.45 system-ui,"Microsoft YaHei",sans-serif;letter-spacing:0}header{height:58px;padding:0 24px;border-bottom:1px solid var(--line);background:var(--white);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:2}h1{font-size:19px;margin:0}button{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:6px;font-size:18px;cursor:pointer}main{max-width:1280px;margin:auto;padding:20px 24px 88px}.metrics{display:grid;grid-template-columns:repeat(5,minmax(130px,1fr));gap:12px}.metric,.panel,.conversation{background:var(--white);border:1px solid var(--line);border-radius:6px}.metric{padding:14px}.metric b{display:block;font-size:24px;margin-top:5px}.label{color:var(--muted);font-size:12px}.identity .label{overflow-wrap:anywhere}.layout{display:grid;grid-template-columns:minmax(0,2fr) minmax(280px,1fr);gap:16px;margin-top:16px}.panel{padding:16px;min-width:0}h2{font-size:15px;margin:0 0 14px}.timeline{height:170px;display:flex;align-items:end;gap:8px;border-bottom:1px solid var(--line)}.bar-wrap{flex:1;min-width:18px;text-align:center}.bar{background:var(--blue);min-height:2px}.bar-date{font-size:10px;color:var(--muted);margin-top:6px;white-space:nowrap}.levels{display:grid;gap:10px}.level{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:8px}.track{height:8px;background:#e8ece9}.fill{height:100%;background:var(--green)}.conversation-list{display:grid;gap:8px;min-width:0}.conversation{padding:13px;display:grid;grid-template-columns:minmax(220px,1.8fr) repeat(4,minmax(80px,.6fr));gap:12px;align-items:center;min-width:0}.conversation h3{font-size:13px;margin:0 0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.meter{height:7px;background:#e7ece9;margin-top:6px}.meter i{display:block;height:100%;background:var(--green)}.meter i.warn{background:var(--amber)}.meter i.high{background:var(--red)}footer{position:fixed;bottom:0;left:0;right:0;background:#17211d;color:#edf4f0;padding:14px 24px;display:flex;justify-content:center;gap:30px;z-index:3}footer b{color:#fff}.empty{color:var(--muted);padding:24px 0}.status{color:var(--green)}@media(max-width:850px){.metrics{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.conversation{grid-template-columns:1fr 1fr}.conversation .identity{grid-column:1/-1}footer{position:static;flex-wrap:wrap;justify-content:flex-start}main{padding-bottom:20px}}@media(max-width:480px){header,main{padding-left:14px;padding-right:14px}.metrics{grid-template-columns:1fr 1fr}.metric b{font-size:20px}.conversation{grid-template-columns:1fr}footer{gap:12px;display:grid}.bar-date{display:none}}
    .conversation>*{min-width:0}.identity{min-width:0;overflow:hidden}.conversation b{overflow-wrap:anywhere}.scope-note{margin:10px 0 0;color:var(--muted);font-size:12px}.scope-note b{color:var(--ink)}@keyframes refresh-spin{to{transform:rotate(360deg)}}#refresh.spinning{animation:refresh-spin .65s ease-in-out}#refresh:disabled{cursor:wait;opacity:.65}
  </style>
</head>
<body>
<header><h1>Memory无限状态台</h1><div><span id="health" class="status">读取中</span> <button id="refresh" title="刷新">&#8635;</button></div></header>
<main><section id="metrics" class="metrics"></section><p class="scope-note"><b>两种 token 不可直接比较：</b>归档估算只覆盖用户与助手可见原文；“最近请求 / 窗口”来自 Codex 模型遥测，还可能包含系统指令、工具、推理和输出。该比值可超过 100%，不表示精确的当前占用或剩余空间。</p><section class="layout"><div class="panel"><h2>每日归档量</h2><div id="timeline" class="timeline"></div></div><div class="panel"><h2>摘要层级</h2><div id="levels" class="levels"></div></div></section><section class="panel" style="margin-top:16px"><h2>对话状态</h2><div id="conversations" class="conversation-list"></div></section></main>
<footer id="footer"></footer>
<script>
const fmt=n=>new Intl.NumberFormat('zh-CN').format(n||0);const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function render(d){const t=d.totals;document.querySelector('#health').textContent=d.health==='ok'?'归档正常':'需要检查';document.querySelector('#metrics').innerHTML=[['对话',t.conversations],['消息',t.messages],['一级摘要',t.summary_counts['1']||0],['归档原文字符',fmt(t.characters)],['归档可见原文估算 token',fmt(t.estimated_tokens)]].map(x=>`<div class="metric"><span class="label">${x[0]}</span><b>${x[1]}</b></div>`).join('');const max=Math.max(1,...d.daily.map(x=>x.characters));document.querySelector('#timeline').innerHTML=d.daily.length?d.daily.slice(-14).map(x=>`<div class="bar-wrap" title="${x.date}: ${fmt(x.characters)} 个归档原文字符"><div class="bar" style="height:${Math.max(2,x.characters/max*145)}px"></div><div class="bar-date">${x.date.slice(5)}</div></div>`).join(''):'<div class="empty">暂无归档</div>';const levels=Object.entries(t.summary_counts).filter(x=>+x[0]<=8),lm=Math.max(1,...levels.map(x=>x[1]));document.querySelector('#levels').innerHTML=levels.map(([l,n])=>`<div class="level"><span>L${l}</span><div class="track"><div class="fill" style="width:${n/lm*100}%"></div></div><b>${n}</b></div>`).join('');document.querySelector('#conversations').innerHTML=d.conversations.map(c=>{const u=c.telemetry?.window_ratio_percent;const cls=u>=100?'high':u>=80?'warn':'';const sums=Object.entries(c.summary_counts).map(([l,n])=>`L${l}: ${n}`).join(' / ')||'暂无';const request=c.telemetry?`${fmt(c.telemetry.request_tokens)} / ${fmt(c.telemetry.context_window)} (${u.toFixed(1)}%)`:'暂无';return `<article class="conversation"><div class="identity"><h3 title="${esc(c.title)}">${esc(c.title)}</h3><span class="label">${esc(c.conversation_id)}</span></div><div title="最近一次 Codex 模型请求总 token / 模型标称上下文窗口；不是精确占用率"><span class="label">最近请求 / 窗口</span><b>${request}</b><div class="meter"><i class="${cls}" style="width:${Math.min(100,u||0)}%"></i></div></div><div><span class="label">归档可见原文估算</span><b>${fmt(c.estimated_archive_tokens)} token</b></div><div><span class="label">完成轮次</span><b>${fmt(c.completed_rounds)}</b></div><div><span class="label">摘要</span><b>${sums}</b></div></article>`}).join('')||'<div class="empty">暂无对话</div>';document.querySelector('#footer').innerHTML=`<span>已归档 <b>${t.archived_days}</b> 天</span><span>原文累计 <b>${fmt(t.characters)}</b> 字符</span><span>可见原文估算 <b>${fmt(t.estimated_tokens)}</b> token</span><span>最后刷新 <b>${new Date(d.generated_at).toLocaleTimeString()}</b></span>`}
async function load(manual=false){const b=document.querySelector('#refresh');if(manual){b.classList.remove('spinning');void b.offsetWidth;b.classList.add('spinning');b.disabled=true}try{render(await(await fetch('/api/status',{cache:'no-store'})).json())}catch(e){document.querySelector('#health').textContent='读取失败'}finally{if(manual)setTimeout(()=>{b.classList.remove('spinning');b.disabled=false},650)}}document.querySelector('#refresh').onclick=()=>load(true);load();setInterval(()=>load(false),5000);
</script></body></html>
