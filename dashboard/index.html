<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Memory无限状态台</title>
  <style>
    :root{color-scheme:light;--ink:#17211d;--muted:#62706a;--line:#d7ded9;--paper:#f6f8f5;--white:#fff;--green:#19734a;--amber:#b76516;--blue:#24689b;--red:#b33a32}
    *{box-sizing:border-box}body{margin:0;background:var(--paper);color:var(--ink);font:14px/1.45 system-ui,"Microsoft YaHei","Yu Gothic UI",sans-serif;letter-spacing:0}
    header{height:58px;padding:0 24px;border-bottom:1px solid var(--line);background:var(--white);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:2}
    header>div{display:flex;align-items:center;gap:8px}h1{font-size:19px;margin:0}button{width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:6px;font-size:18px;cursor:pointer}.language-control{position:relative}.language-icon{position:relative;display:block;width:18px;height:18px;margin:auto;font-weight:700}.language-icon .ideograph{position:absolute;left:0;top:-3px;font-size:13px}.language-icon .latin{position:absolute;right:0;bottom:-4px;font-size:12px}.language-menu{position:absolute;right:0;top:40px;width:132px;padding:5px;background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 8px 24px rgba(23,33,29,.14);display:none;z-index:5}.language-menu.open{display:grid}.language-menu button{width:100%;height:32px;border:0;text-align:left;padding:0 9px;font-size:13px}.language-menu button:hover,.language-menu button[aria-checked="true"]{background:#edf4f0;color:var(--green)}
    main{max-width:1280px;margin:auto;padding:20px 24px 88px}.metrics{display:grid;grid-template-columns:repeat(4,minmax(130px,1fr));gap:12px}.metric,.panel,.conversation{background:var(--white);border:1px solid var(--line);border-radius:6px}.metric{padding:14px}.metric b{display:block;font-size:24px;margin-top:5px}.label{color:var(--muted);font-size:12px}.identity .label{overflow-wrap:anywhere}
    .layout{display:grid;grid-template-columns:minmax(0,2fr) minmax(280px,1fr);gap:16px;margin-top:16px}.panel{padding:16px;min-width:0}h2{font-size:15px;margin:0 0 14px}.timeline{height:170px;display:flex;align-items:end;gap:8px;border-bottom:1px solid var(--line)}.bar-wrap{flex:1;min-width:18px;text-align:center}.bar{background:var(--blue);min-height:2px}.bar-date{font-size:10px;color:var(--muted);margin-top:6px;white-space:nowrap}
    .levels{display:grid;gap:10px}.level{display:grid;grid-template-columns:42px 1fr 42px;align-items:center;gap:8px}.track{height:8px;background:#e8ece9}.fill{height:100%;background:var(--green)}.conversation-list{display:grid;gap:8px;min-width:0}.conversation{padding:13px;display:grid;grid-template-columns:minmax(220px,1.8fr) repeat(5,minmax(80px,.6fr));gap:12px;align-items:center;min-width:0}.conversation>*{min-width:0}.conversation h3{font-size:13px;margin:0 0 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.conversation b{overflow-wrap:anywhere}.identity{min-width:0;overflow:hidden}
    .meter{height:7px;background:#e7ece9;margin-top:6px}.meter i{display:block;height:100%;background:var(--green)}.meter i.warn{background:var(--amber)}.meter i.high{background:var(--red)}footer{position:fixed;bottom:0;left:0;right:0;background:#17211d;color:#edf4f0;padding:14px 24px;display:flex;justify-content:center;gap:30px;z-index:3}footer b{color:#fff}.empty{color:var(--muted);padding:24px 0}.status{color:var(--green)}
    @keyframes refresh-spin{to{transform:rotate(360deg)}}#refresh.spinning{animation:refresh-spin .65s ease-in-out}#refresh:disabled{cursor:wait;opacity:.65}
    @media(max-width:850px){.metrics{grid-template-columns:repeat(2,1fr)}.layout{grid-template-columns:1fr}.conversation{grid-template-columns:1fr 1fr}.conversation .identity{grid-column:1/-1}footer{position:static;flex-wrap:wrap;justify-content:flex-start}main{padding-bottom:20px}}
    @media(max-width:480px){header,main{padding-left:14px;padding-right:14px}h1{font-size:16px}.metric b{font-size:20px}.conversation{grid-template-columns:1fr}footer{gap:12px;display:grid}.bar-date{display:none}}
  </style>
</head>
<body>
<header>
  <h1 id="app-title"></h1>
  <div><span id="health" class="status"></span><div class="language-control"><button id="language-toggle" aria-haspopup="menu" aria-expanded="false"><span class="language-icon" aria-hidden="true"><span class="ideograph">文</span><span class="latin">A</span></span></button><div id="language-menu" class="language-menu" role="menu"><button data-language="zh" role="menuitemradio">中文</button><button data-language="ja" role="menuitemradio">日本語</button><button data-language="en" role="menuitemradio">English</button></div></div><button id="refresh">&#8635;</button></div>
</header>
<main>
  <section id="metrics" class="metrics"></section>
  <section class="layout"><div class="panel"><h2 id="daily-title"></h2><div id="timeline" class="timeline"></div></div><div class="panel"><h2 id="levels-title"></h2><div id="levels" class="levels"></div></div></section>
  <section class="panel" style="margin-top:16px"><h2 id="conversations-title"></h2><div id="conversations" class="conversation-list"></div></section>
</main>
<footer id="footer"></footer>
<script>
const copy={
  zh:{locale:'zh-CN',title:'Memory无限状态台',healthy:'归档正常',attention:'需要检查',loading:'读取中',failed:'读取失败',refresh:'刷新',language:'切换语言',daily:'每日归档量',levels:'摘要层级',conversations:'对话状态',metrics:['对话','消息','工具活动','一级摘要'],emptyArchive:'暂无归档',emptyConversation:'暂无对话',none:'暂无',requestWindow:'请求 / 窗口',archiveEstimate:'归档估算',toolCalls:'工具调用',rounds:'完成轮次',summaries:'摘要',days:'已归档',dayUnit:'天',characters:'上下文累计',characterUnit:'字符',tokenEstimate:'归档上下文估算',lastRefresh:'最后刷新',barChars:'个归档上下文字符',requestTip:(r,w)=>`最近请求 ${r} token / 标称窗口 ${w} token；不是精确占用率`},
  en:{locale:'en-US',title:'Memory Wuxian Status',healthy:'Archive healthy',attention:'Needs attention',loading:'Loading',failed:'Load failed',refresh:'Refresh',language:'Change language',daily:'Daily archive volume',levels:'Summary levels',conversations:'Conversation status',metrics:['Conversations','Messages','Tool activity','Level 1 summaries'],emptyArchive:'No archive data',emptyConversation:'No conversations',none:'None',requestWindow:'Request / window',archiveEstimate:'Archive estimate',toolCalls:'Tool calls',rounds:'Completed rounds',summaries:'Summaries',days:'Archived for',dayUnit:'days',characters:'Archived context',characterUnit:'characters',tokenEstimate:'Archive context estimate',lastRefresh:'Last refresh',barChars:'archived context characters',requestTip:(r,w)=>`Latest request ${r} tokens / advertised window ${w} tokens; not a precise utilization reading`},
  ja:{locale:'ja-JP',title:'Memory無限 ステータス',healthy:'アーカイブ正常',attention:'確認が必要',loading:'読み込み中',failed:'読み込み失敗',refresh:'更新',language:'言語を変更',daily:'日別アーカイブ量',levels:'要約レベル',conversations:'会話ステータス',metrics:['会話','メッセージ','ツール履歴','レベル1要約'],emptyArchive:'アーカイブなし',emptyConversation:'会話なし',none:'なし',requestWindow:'リクエスト / 上限',archiveEstimate:'アーカイブ推定',toolCalls:'ツール呼出',rounds:'完了ラウンド',summaries:'要約',days:'アーカイブ期間',dayUnit:'日',characters:'累計コンテキスト',characterUnit:'文字',tokenEstimate:'アーカイブ推定量',lastRefresh:'最終更新',barChars:'件のアーカイブ文字',requestTip:(r,w)=>`直近リクエスト ${r} token / 公称上限 ${w} token。正確な使用率ではありません`}
};
const supported=['zh','en','ja'];let language=localStorage.getItem('memory-wuxian-language')||((navigator.language||'zh').toLowerCase().startsWith('ja')?'ja':(navigator.language||'zh').toLowerCase().startsWith('en')?'en':'zh');if(!supported.includes(language))language='zh';let latest=null;
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const tr=()=>copy[language];const fmt=n=>new Intl.NumberFormat(tr().locale).format(n||0);
function staticText(){const t=tr();document.documentElement.lang=t.locale;document.title=t.title;document.querySelector('#app-title').textContent=t.title;document.querySelector('#daily-title').textContent=t.daily;document.querySelector('#levels-title').textContent=t.levels;document.querySelector('#conversations-title').textContent=t.conversations;document.querySelector('#refresh').title=t.refresh;document.querySelector('#refresh').setAttribute('aria-label',t.refresh);document.querySelector('#language-toggle').title=t.language;document.querySelector('#language-toggle').setAttribute('aria-label',t.language);document.querySelectorAll('[data-language]').forEach(b=>b.setAttribute('aria-checked',String(b.dataset.language===language)))}
function render(d){
  latest=d;const t=tr(),x=d.totals;
  document.querySelector('#health').textContent=d.health==='ok'?t.healthy:t.attention;
  document.querySelector('#metrics').innerHTML=[[t.metrics[0],x.conversations],[t.metrics[1],x.messages],[t.metrics[2],x.tool_activities],[t.metrics[3],x.summary_counts['1']||0]].map(v=>`<div class="metric"><span class="label">${v[0]}</span><b>${fmt(v[1])}</b></div>`).join('');
  const max=Math.max(1,...d.daily.map(v=>v.characters));
  document.querySelector('#timeline').innerHTML=d.daily.length?d.daily.slice(-14).map(v=>`<div class="bar-wrap" title="${v.date}: ${fmt(v.characters)} ${t.barChars}"><div class="bar" style="height:${Math.max(2,v.characters/max*145)}px"></div><div class="bar-date">${v.date.slice(5)}</div></div>`).join(''):`<div class="empty">${t.emptyArchive}</div>`;
  const levels=Object.entries(x.summary_counts).filter(v=>+v[0]<=8),lm=Math.max(1,...levels.map(v=>v[1]));
  document.querySelector('#levels').innerHTML=levels.map(([l,n])=>`<div class="level"><span>L${l}</span><div class="track"><div class="fill" style="width:${n/lm*100}%"></div></div><b>${fmt(n)}</b></div>`).join('');
  document.querySelector('#conversations').innerHTML=d.conversations.map(c=>{const u=c.telemetry?.window_ratio_percent,cls=u>=100?'high':u>=80?'warn':'',sums=Object.entries(c.summary_counts).map(([l,n])=>`L${l}: ${fmt(n)}`).join(' / ')||t.none,request=u==null?t.none:u.toFixed(1)+'%',tip=c.telemetry?t.requestTip(fmt(c.telemetry.request_tokens),fmt(c.telemetry.context_window)):'';return `<article class="conversation"><div class="identity"><h3 title="${esc(c.title)}">${esc(c.title)}</h3><span class="label">${esc(c.conversation_id)}</span></div><div title="${esc(tip)}"><span class="label">${t.requestWindow}</span><b>${request}</b><div class="meter"><i class="${cls}" style="width:${Math.min(100,u||0)}%"></i></div></div><div><span class="label">${t.archiveEstimate}</span><b>${fmt(c.estimated_archive_tokens)} token</b></div><div><span class="label">${t.toolCalls}</span><b>${fmt(c.tool_activity_count)}</b></div><div><span class="label">${t.rounds}</span><b>${fmt(c.completed_rounds)}</b></div><div><span class="label">${t.summaries}</span><b>${sums}</b></div></article>`}).join('')||`<div class="empty">${t.emptyConversation}</div>`;
  document.querySelector('#footer').innerHTML=`<span>${t.days} <b>${fmt(x.archived_days)}</b> ${t.dayUnit}</span><span>${t.characters} <b>${fmt(x.characters)}</b> ${t.characterUnit}</span><span>${t.tokenEstimate} <b>${fmt(x.estimated_tokens)}</b> token</span><span>${t.lastRefresh} <b>${new Date(d.generated_at).toLocaleTimeString(t.locale)}</b></span>`;
}
async function load(manual=false){const b=document.querySelector('#refresh');if(manual){b.classList.remove('spinning');void b.offsetWidth;b.classList.add('spinning');b.disabled=true}try{render(await(await fetch('/api/status',{cache:'no-store'})).json())}catch(e){document.querySelector('#health').textContent=tr().failed}finally{if(manual)setTimeout(()=>{b.classList.remove('spinning');b.disabled=false},650)}}
const languageToggle=document.querySelector('#language-toggle'),languageMenu=document.querySelector('#language-menu');function closeLanguageMenu(){languageMenu.classList.remove('open');languageToggle.setAttribute('aria-expanded','false')}languageToggle.onclick=()=>{const open=languageMenu.classList.toggle('open');languageToggle.setAttribute('aria-expanded',String(open))};document.querySelectorAll('[data-language]').forEach(b=>b.onclick=()=>{language=b.dataset.language;localStorage.setItem('memory-wuxian-language',language);closeLanguageMenu();staticText();if(latest)render(latest)});document.addEventListener('click',e=>{if(!e.target.closest('.language-control'))closeLanguageMenu()});document.querySelector('#refresh').onclick=()=>load(true);staticText();document.querySelector('#health').textContent=tr().loading;load();setInterval(()=>load(false),30000);
</script>
</body>
</html>
