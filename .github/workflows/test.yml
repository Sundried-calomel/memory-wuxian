name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --locked --manifest-path native-collector/Cargo.toml
      - run: cargo build --locked --manifest-path native-collector/Cargo.toml
      - run: python -m unittest discover -s tests -v
