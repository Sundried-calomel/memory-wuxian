name: test

on:
  push:
  pull_request:

jobs:
  unittest:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check --manifest-path native-collector/Cargo.toml
      - run: cargo check --locked --all-targets --manifest-path native-collector/Cargo.toml
      - run: cargo test --locked --manifest-path native-collector/Cargo.toml
      - run: cargo build --locked --bins --manifest-path native-collector/Cargo.toml
      - run: python -m unittest discover -s tests -v
