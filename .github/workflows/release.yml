name: release-installers

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos-installer:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Build universal native binaries
        run: |
          cargo build --release --locked --bins --target aarch64-apple-darwin --manifest-path native-collector/Cargo.toml
          cargo build --release --locked --bins --target x86_64-apple-darwin --manifest-path native-collector/Cargo.toml
          mkdir -p bin
          for binary in memory-wuxian-collector memory-wuxian-envelope; do
            lipo -create \
              "native-collector/target/aarch64-apple-darwin/release/$binary" \
              "native-collector/target/x86_64-apple-darwin/release/$binary" \
              -output "bin/$binary"
          done
          chmod +x bin/memory-wuxian-collector bin/memory-wuxian-envelope packaging/macos/build_pkg.sh packaging/macos/scripts/postinstall
      - name: Build PKG
        shell: bash
        run: |
          version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          if [[ "$GITHUB_REF" == refs/tags/* && "${GITHUB_REF_NAME#v}" != "$version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match project version $version" >&2
            exit 1
          fi
          packaging/macos/build_pkg.sh "$version" dist
      - uses: actions/upload-artifact@v4
        with:
          name: macos-installer
          path: dist/*

  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build native binaries
        shell: pwsh
        run: |
          cargo build --release --locked --bins --manifest-path native-collector/Cargo.toml
          New-Item -ItemType Directory -Force bin | Out-Null
          Copy-Item native-collector/target/release/memory-wuxian-collector.exe bin/memory-wuxian-collector.exe -Force
          Copy-Item native-collector/target/release/memory-wuxian-envelope.exe bin/memory-wuxian-envelope.exe -Force
      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress
      - name: Build EXE installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          if ($env:GITHUB_REF.StartsWith('refs/tags/') -and $env:GITHUB_REF_NAME.TrimStart('v') -ne $version) {
            throw "Tag $env:GITHUB_REF_NAME does not match project version $version"
          }
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DSourceRoot=$PWD" "/DAppVersion=$version" packaging/windows/MemoryWuxian.iss
          if ($LASTEXITCODE -ne 0) { throw "Inno Setup failed with exit code $LASTEXITCODE" }
          $installer = Get-Item "dist\MemoryWuxian-$version-Windows-x64-Setup.exe"
          $hash = (Get-FileHash $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            "$($installer.FullName).sha256",
            "$hash  $($installer.Name)`n",
            [Text.UTF8Encoding]::new($false)
          )
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [macos-installer, windows-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
